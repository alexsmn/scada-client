name: CMake on multiple platforms

on:
  push:
    branches: [ "release/2.5" ]
  pull_request:
    branches: [ "release/2.5" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            triplet: x64-windows
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            triplet: x86-windows
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++

    env:
      VCPKG_BINARY_SOURCES: 'clear;default'

    steps:
    - uses: actions/checkout@v4
      with:
        path: scada-client

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/scada-core
        ref: release/2.5
        path: scada-core

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/scada-common
        ref: release/2.5
        path: scada-common

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/transport
        ref: release/2.5
        path: transport

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/chromebase
        path: chromebase

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/express
        path: express

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/promise.hpp
        path: promise.hpp

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/graph-qt
        path: graph-qt

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/opcuapp
        path: opcuapp

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/UA-AnsiC
        path: UA-AnsiC

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y autoconf automake autoconf-archive libltdl-dev

    - name: Normalize workspace path
      shell: bash
      run: echo "WORKSPACE=${{ github.workspace }}" | sed 's|\\|/|g' >> "$GITHUB_ENV"

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ contains(matrix.triplet, 'x86') && 'x86' || 'x64' }}

    - name: Set up vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'e5a1490e1409d175932ef6014519e9ae149ddb7c'

    - name: Configure
      working-directory: scada-client
      run: >
        cmake --preset ninja
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_MODULE_PATH="${{ env.WORKSPACE }}/scada-client;${{ env.WORKSPACE }}/scada-common;${{ env.WORKSPACE }}/scada-core;${{ env.WORKSPACE }}/transport;${{ env.WORKSPACE }}/transport/cmake;${{ env.WORKSPACE }}/chromebase;${{ env.WORKSPACE }}/express;${{ env.WORKSPACE }}/promise.hpp;${{ env.WORKSPACE }}/graph-qt;${{ env.WORKSPACE }}/opcuapp"
        -DBUILD_MODUS=OFF
        -DBUILD_OPC=OFF
        -DBUILD_VIDICON=OFF
        -DOPCUA_ROOT_DIR="${{ env.WORKSPACE }}/UA-AnsiC"
        -DOPCUAPP_DIR="${{ env.WORKSPACE }}/opcuapp"
        -DOPCUA_DIR="${{ env.WORKSPACE }}/opcuapp"
        ${{ matrix.triplet && format('-DVCPKG_TARGET_TRIPLET={0}', matrix.triplet) || '' }}

    - name: Build
      working-directory: scada-client
      run: cmake --build build/ninja --config RelWithDebInfo

    - name: Test
      working-directory: scada-client
      run: ctest --test-dir build/ninja --build-config RelWithDebInfo --output-on-failure
