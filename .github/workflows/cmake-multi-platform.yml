name: CMake on multiple platforms

on:
  push:
    branches: [ "release/2.5" ]
  pull_request:
    branches: [ "release/2.5" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            triplet: x64-windows
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            triplet: x86-windows
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++

    env:
      VCPKG_BINARY_SOURCES: 'clear;default'

    steps:
    - uses: actions/checkout@v4
      with:
        path: scada-client

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/scada-core
        ref: release/2.5
        path: scada-core

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/scada-common
        ref: release/2.5
        path: scada-common

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/transport
        ref: release/2.5
        path: transport

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/chromebase
        path: chromebase

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/express
        path: express

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/promise.hpp
        path: promise.hpp

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/graph-qt
        path: graph-qt

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/opcuapp
        path: opcuapp

    - uses: actions/checkout@v4
      with:
        repository: alexsmn/UA-AnsiC
        path: UA-AnsiC

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y autoconf automake autoconf-archive

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ contains(matrix.triplet, 'x86') && 'x86' || 'x64' }}

    - name: Set up vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'e5a1490e1409d175932ef6014519e9ae149ddb7c'

    - name: Configure
      working-directory: scada-client
      run: >
        cmake --preset ninja
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_MODULE_PATH="${{ github.workspace }}/scada-client;${{ github.workspace }}/scada-common;${{ github.workspace }}/scada-core;${{ github.workspace }}/transport;${{ github.workspace }}/transport/cmake;${{ github.workspace }}/chromebase;${{ github.workspace }}/express;${{ github.workspace }}/promise.hpp;${{ github.workspace }}/graph-qt;${{ github.workspace }}/opcuapp"
        -DBUILD_MODUS=OFF
        -DBUILD_OPC=OFF
        -DBUILD_VIDICON=OFF
        -DOPCUA_ROOT_DIR="${{ github.workspace }}/UA-AnsiC"
        -DOPCUAPP_DIR="${{ github.workspace }}/opcuapp"
        -DOPCUA_DIR="${{ github.workspace }}/opcuapp"
        ${{ matrix.triplet && format('-DVCPKG_TARGET_TRIPLET={0}', matrix.triplet) || '' }}

    - name: Build
      working-directory: scada-client
      run: cmake --build build/ninja --config RelWithDebInfo

    - name: Test
      working-directory: scada-client
      run: ctest --test-dir build/ninja --build-config RelWithDebInfo --output-on-failure
